# Flatpak manifest for Walltz
# Build: flatpak-builder --user --install build-dir flatpak/org.walltz.walltz.yml
# Run:   flatpak run org.walltz.walltz

id: org.walltz.walltz
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk

command: walltz
rename-icon: org.walltz.walltz

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-pictures
  - --env=QT_ENABLE_HIGHDPI_SCALING=1

modules:
  - name: walltz
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    post-install:
      - install -Dm644 ../COPYING /app/share/licenses/org.walltz.walltz/COPYING
      - /app/bin/walltz --help 2>/dev/null || true
    sources:
      - type: dir
        path: ..
