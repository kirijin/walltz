<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Monitor frame -->
  <rect x="6" y="8" width="52" height="36" rx="3" ry="3" fill="none" stroke="#e0e0e0" stroke-width="2.5"/>
  <!-- Screen content: stylized wallpaper image -->
  <clipPath id="screen-clip">
    <rect x="10" y="12" width="44" height="28" rx="1"/>
  </clipPath>
  <g clip-path="url(#screen-clip)">
    <!-- Sky -->
    <rect x="10" y="12" width="44" height="18" fill="#2196f3"/>
    <!-- Ground -->
    <rect x="10" y="28" width="44" height="12" fill="#4caf50"/>
    <!-- Sun -->
    <circle cx="42" cy="20" r="7" fill="#ffeb3b"/>
    <!-- Mountain -->
    <polygon points="10,40 24,22 38,40" fill="#388e3c" opacity="0.8"/>
    <polygon points="28,40 44,18 56,40" fill="#2e7d32" opacity="0.8"/>
  </g>
  <!-- Stand -->
  <rect x="24" y="44" width="16" height="4" rx="1" fill="#e0e0e0"/>
  <rect x="14" y="48" width="36" height="3" rx="1.5" fill="#e0e0e0"/>
  <!-- Overlay: processing badge (the W) -->
  <circle cx="32" cy="28" r="9" fill="none" stroke="#ff4081" stroke-width="1.5" opacity="0.0">
    <animate attributeName="opacity" values="0;0.3;0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
