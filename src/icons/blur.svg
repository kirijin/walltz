<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Solid → dashed → more dashed = decreasing clarity = blur -->
  <line x1="4" y1="7" x2="20" y2="7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 2"/>
  <line x1="8" y1="17" x2="16" y2="17" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 3"/>
</svg>
